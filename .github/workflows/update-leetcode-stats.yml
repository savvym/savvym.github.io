name: Update LeetCode Stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-leetcode-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh LeetCode stats
        run: python3 scripts/update_leetcode_stats.py --user-slug savvym

      - name: Commit changes
        run: |
          if git diff --quiet -- src/data/leetcode-stats.json; then
            echo "No stats changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/leetcode-stats.json
          git commit -m "Update LeetCode stats"
          git push
